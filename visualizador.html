<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Didáctica</title>

    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="logo">
            <h2>PLATAFORMA DIDÁCTICA</h2>
            <p>Laboratorio de Robótica</p>
        </div>

        <nav>
            <ul>
                <li class="active">
                    <a href="dashboard.html">Inicio</a>
                </li>

                <li>
                    <a href="modulos.html">Módulos</a>
                </li>

                <li>
                    <a href="practicas.html">Prácticas</a>
                </li>

                <li>
                    <a href="recursos.html">Recursos</a>
                </li>

                <li>
                    <a href="evaluaciones.html">Evaluaciones</a>
                </li>
                <li>
                     <a href="visualizador.html">Modelo 3D</a>
                </li>
                <li>
                     <a href="matlab.html">Simulación MATLAB</a>
                </li>
                <li>
                     <a href="progreso.html">Mi progreso</a>
                </li>
            </ul>
            </ul>
        </nav>

        <!-- 🔥 BOTÓN CORRECTAMENTE UBICADO -->
        <div style="padding:20px;">
            <button id="logoutBtn">Cerrar sesión</button>
        </div>

    </aside>

    <!-- CONTENIDO -->
    <main class="main-content">

    <div class="topbar">

        <div class="user-info">
            <span class="user-icon">👤</span>
            <span id="userName">Usuario</span>
            <button id="logoutTop" class="logout-btn">Salir</button>
        </div>

    </div>

    <section class="viewer-section">

    <div class="viewer-header">

        <h1>Visualizador 3D</h1>

        <p>

            Manipule el modelo CAD del Dobot Magician Lite
            directamente desde la plataforma.

        </p>

    </div>

    <div class="viewer-layout">

        <div class="viewer-panel">

            <div id="viewer3D"></div>

        </div>

        <div class="tools-panel">

            <h3>Herramientas</h3>

            <button id="frontView">Vista frontal</button>

            <button id="topView">Vista superior</button>

            <button id="sideView">Vista lateral</button>

            <button id="isoView">Vista isométrica</button>

            <hr>

            <label>

                <input type="checkbox" id="gridCheck" checked>

                Mostrar cuadrícula

            </label>

            <label>

                <input type="checkbox" id="axisCheck" checked>

                Mostrar ejes XYZ

            </label>

            <label>

                <input type="checkbox" id="wireframeCheck">

                Modo Wireframe

            </label>

            <label>

                <input type="checkbox" id="transparentCheck">

                Transparencia

            </label>

        </div>

    </div>

</section>

</main>

    

    <!-- 🔥 LOGOUT -->
     <script>

        firebase.auth().onAuthStateChanged((user)=>{

            if(!user){

                window.location.href="index.html";

            }else{

        document.getElementById("userName").textContent=
        "Bienvenido: "+user.displayName;

         }

        });

        </script>
   
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script src="assets/js/firebase-config.js"></script>

    <script src="assets/js/logout.js"></script>

    <script type="module" src="assets/js/visor3d.js"></script>

</body>
</html>

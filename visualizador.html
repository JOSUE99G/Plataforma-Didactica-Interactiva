<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Didáctica</title>

    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="logo">
            <h2>PLATAFORMA DIDÁCTICA</h2>
            <p>Laboratorio de Robótica</p>
        </div>

        <nav>
            <ul>
                <li class="active">
                    <a href="dashboard.html">Inicio</a>
                </li>

                <li>
                    <a href="modulos.html">Módulos</a>
                </li>

                <li>
                    <a href="practicas.html">Prácticas</a>
                </li>

                <li>
                    <a href="recursos.html">Recursos</a>
                </li>

                <li>
                    <a href="evaluaciones.html">Evaluaciones</a>
                </li>
            </ul>
        </nav>

        <!-- 🔥 BOTÓN CORRECTAMENTE UBICADO -->
        <div style="padding:20px;">
            <button id="logoutBtn">Cerrar sesión</button>
        </div>

    </aside>

    <!-- CONTENIDO -->
    <main class="main-content">

    <div class="topbar">

        <div class="user-info">
            <span class="user-icon">👤</span>
            <span id="userName">Usuario</span>
            <button id="logoutBtn" class="logout-btn">Salir</button>
        </div>

    </div>

    <section style="padding:20px;">

    <h1>Modelo 3D del Brazo Robótico</h1>

    <div class="sketchfab-embed-wrapper" style="width:100%; height:500px;">

        <iframe 
            title="3-cable Spi Rob"
            src="https://sketchfab.com/models/10d49cf06c2f4fe1b4e2f940d4c3fd9b/embed"
            style="width:100%; height:100%; border:none;"
            allowfullscreen
            allow="autoplay; fullscreen; xr-spatial-tracking">
        </iframe>

    </div>

    <p style="margin-top:15px;">
        Usa el mouse para interactuar con el modelo:
    </p>

    <ul>
        <li>Click + arrastrar → rotar</li>
        <li>Scroll → zoom</li>
        <li>Click derecho → mover</li>
    </ul>

</section>

</main>

    <!-- 🔥 FIREBASE (OBLIGATORIO) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="assets/js/firebase-config.js"></script>
    <script>
    const firebaseConfig = {
    apiKey: "AIzaSyAFPRQMxKeYuXCAxATEM5E92CMTpHVvogk",
    authDomain: "robotica-lab-mecatronica.firebaseapp.com",
    projectId: "robotica-lab-mecatronica",
    storageBucket: "robotica-lab-mecatronica.firebasestorage.app",
    messagingSenderId: "856148247166",
    appId: "1:856148247166:web:47902d9745e8fe272c4e2f"
    };

        firebase.initializeApp(firebaseConfig);
    </script>

    <!-- 🔥 PROTECCIÓN DE ACCESO -->
    <script>
        firebase.auth().onAuthStateChanged((user) => {

            if (!user) {
                window.location.href = "index.html";
            } else {
                document.getElementById("userName").textContent =
                    "Bienvenido: " + user.displayName;
            }

        });
    </script>

    <!-- 🔥 LOGOUT -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <script src="assets/js/firebase-config.js"></script>

    <script src="assets/js/logout.js"></script>

</body>
</html>
